<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="black"/>
  <!-- Minute hand: 180° (straight down) -->
  <line x1="50" y1="50" x2="50" y2="86" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Hour hand: 225° (7:30, lower-left) -->
  <line x1="50" y1="50" x2="31.6" y2="68.4" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="50" cy="50" r="5.5" fill="white"/>
</svg>
